<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Todo List</h1>
    <form id="todo-form">
      <input id="new-task" type="text" placeholder="Nova tarefa" aria-label="Nova tarefa" />
      <button id="add-btn" type="submit">Adicionar</button>
    </form>
    <section class="filters">
      <button data-filter="all" class="active">Todas</button>
      <button data-filter="active">Ativas</button>
      <button data-filter="completed">Concluídas</button>
    </section>
    <ul id="todo-list" aria-live="polite"></ul>
  </main>
  <script src="app.js"></script>
</body>
</html>
